name: Release

# Dispatch only. This used to also fire on "v*" tags, from back when ci.yml
# could not release on its own — but release-please now creates those tags, so
# every release raced this workflow against ci.yml's publish job. ci.yml always
# won (it publishes seconds earlier, in the same run that cut the tag) and this
# one always lost with "already exists", handing back a red run per release.
# One publishing path, and it is the one where the checks gate it.
#
# The tag-guarded steps below are kept but now only reachable if the trigger
# ever comes back; on dispatch the workflow just builds a VSIX to inspect.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, publish, and create release
    runs-on: ubuntu-latest
    # exposed as env so step-level if: can skip publishing when a token
    # isn't configured yet
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # merge-base below needs real history, not a shallow clone.
          fetch-depth: 0

      # A tag pushed from any branch would otherwise publish, and a Marketplace
      # version can never be taken back. Only tags reachable from main release.
      - name: Check the tag is on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch --no-tags --quiet origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Tag $GITHUB_REF_NAME points at a commit that is not on main." >&2
            echo "Merge the fix into main first, then tag the merged commit." >&2
            exit 1
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      # A tag that disagrees with package.json would publish the wrong version,
      # and a Marketplace version can never be republished.
      - name: Check the tag matches the package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $pkg" >&2
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package VSIX
        run: npm run package

      # Publish before cutting the release: a Marketplace failure then leaves
      # nothing behind, and the tag can be moved and pushed again.
      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/') && env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --no-dependencies --packagePath ./*.vsix

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: "*.vsix"
          generate_release_notes: true

      # workflow_dispatch only: short-lived copy to eyeball the VSIX
      # without tagging or publishing.
      - name: Upload dry-run VSIX
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tf-companion-vsix-dryrun
          path: "*.vsix"
          if-no-files-found: error
          retention-days: 3
